
   version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: hayyak_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hayyak_db
      MYSQL_USER: hayyak
      MYSQL_PASSWORD: hayyak123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hayyak_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hayyak_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      STATIC_URL: "/static/"
      MEDIA_URL: "/media/"
      # Ensure Django uses the correct DB settings from the 'db' service
      DATABASE_URL: mysql://hayyak:hayyak123@db:3306/hayyak_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: hayyak_frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      - VITE_REACT_APP_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's

volumes:
  mysql_data:
