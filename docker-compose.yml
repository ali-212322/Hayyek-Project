services:
  db:
    image: mysql:8.0
    container_name: hayyak_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hayyak_db
      MYSQL_USER: hayyak
      MYSQL_PASSWORD: hayyak123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hayyak_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hayyak_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      target: dev                          # ← use the dev stage in Dockerfile
    container_name: hayyak_frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"                        # ← Vite dev port
    volumes:
      - ./frontend:/app                    # ← live sync your code
      - /app/node_modules                  # ← keep container node_modules intact
    command: npm run dev -- --host         # ← --host exposes Vite outside container

volumes:
  mysql_data:
